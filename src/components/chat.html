<!-- Chat Bubble -->
<button class="chat-bubble border-none cursor-pointer focus-visible:ring-4 focus-visible:ring-purple-300" id="chatBubble" aria-label="Open chat">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" />
    <path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z" />
  </svg>
</button>

<!-- Chat Container -->
<div class="chat-container hidden" id="chatContainer" role="dialog" aria-label="Chat window">
  <audio src="/audio/incoming-message-sound-effect.mp3" preload="none" id="audio"></audio>
  <div class="chat-header" id="chatHeader">
    <div class="header-title">
      <span class="material-symbols-outlined text-2xl">auto_awesome</span>
      <span class="font-bold text-lg">Intwell Assistant</span>
    </div>
    <div class="header-buttons">
      <button id="minimizeChat" aria-label="Minimize chat" class="chat-header-btn"><span class="material-symbols-outlined">remove</span></button>
      <button id="closeChat" aria-label="Close chat" class="chat-header-btn"><span class="material-symbols-outlined">close</span></button>
    </div>
  </div>

  <div class="chat-body" id="chatBody" aria-live="polite">
    <div class="chat-message bot-message">
      Hi there! 👋 I'm the Intwell Web Agency assistant. How can I help you today with your web development needs?
    </div>
  </div>

  <div class="chat-footer">
    <input type="text" class="chat-input focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-purple-600" id="chatInput" placeholder="Type your message here..." autocomplete="off" />
    <button class="send-button focus-visible:ring-2 focus-visible:ring-purple-600 rounded-sm outline-none" id="sendMessage" aria-label="Send message">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
  </div>
</div>
