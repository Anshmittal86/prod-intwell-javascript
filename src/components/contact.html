<section class="w-full px-margin-mobile md:px-margin-desktop py-12 max-w-[1048px] mx-auto reveal active scroll-mt-24" id="contact">
  <div class="w-full grid grid-cols-1 lg:grid-cols-2 gap-gutter glass-card rounded-[40px] overflow-hidden p-4 md:p-8">
    <h2 class="font-headline-xl text-headline-xl text-primary mb-6 text-center col-span-1 lg:col-span-2">Contact Us</h2>
    
    <div class="p-2 md:p-6 flex flex-col">
      <form class="space-y-4" id="contact-form">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="name" class="sr-only">Name</label>
            <input id="name" name="user_name" class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-all px-4 py-3 rounded-t-lg outline-none" placeholder="Name" type="text" autocomplete="name" required>
          </div>
          <div>
            <label for="email" class="sr-only">Email</label>
            <input id="email" name="user_email" class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-all px-4 py-3 rounded-t-lg outline-none" placeholder="Email" type="email" autocomplete="email" required>
          </div>
        </div>
        <div>
          <label for="phone" class="sr-only">Mobile No</label>
          <input id="phone" name="user_phone" class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-all px-4 py-3 rounded-t-lg outline-none" placeholder="Mobile No" type="tel" autocomplete="tel">
        </div>
        <div>
          <label for="message" class="sr-only">Message</label>
          <textarea id="message" name="message" class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-all px-4 py-3 rounded-t-lg resize-none outline-none" placeholder="Message" rows="4" required></textarea>
        </div>
        <div class="flex">
          <button class="bg-primary text-on-primary px-8 py-3 rounded-xl font-bold hover:bg-primary-container transition-colors shadow-lg focus-visible:ring-2 focus-visible:ring-secondary focus-visible:ring-offset-2 outline-none" type="submit">Submit Message</button>
        </div>
      </form>
      
      <div class="mt-6 pt-6 border-t border-outline-variant/30 space-y-4">
        <div class="flex items-center gap-3 text-on-surface-variant">
          <span class="material-symbols-outlined text-secondary">call</span>
          <span class="font-body-md">Phone: <a href="tel:+918791473908" class="hover:text-primary focus-visible:ring-2 focus-visible:ring-primary rounded-sm outline-none">+91 8791473908</a></span>
        </div>
        <div class="flex items-center gap-3 text-on-surface-variant">
          <span class="material-symbols-outlined text-secondary">mail</span>
          <span class="font-body-md">Email: <a href="mailto:intwelldevelopment@gmail.com" class="hover:text-primary focus-visible:ring-2 focus-visible:ring-primary rounded-sm outline-none">intwelldevelopment@gmail.com</a></span>
        </div>
      </div>
    </div>
    
    <div class="relative min-h-[250px] lg:min-h-full rounded-[32px] overflow-hidden border border-outline-variant/30">
      <iframe class="absolute inset-0 w-full h-full grayscale-[50%] hover:grayscale-0 transition-all duration-500" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3473.184301165622!2d77.69476417465633!3d29.48182057521178!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390c1b00684c9f4b%3A0x78548d8bc9d988!2sIntwell%20Web%20Development!5e0!3m2!1sen!2sin!4v1781953651364!5m2!1sen!2sin" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>
</section>
